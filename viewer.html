<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      pointer-events: none;
      text-align: center;
      background: rgba(0,0,0,0.35);
      padding: 8px 18px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      user-select: none;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      background: #1a1a2e;
      z-index: 10;
      transition: opacity 0.6s;
      flex-direction: column;
      gap: 16px;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6c7bff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>加载模型中…</span>
  </div>
  <div id="info">鼠标拖拽旋转 · 滚轮缩放 · 右键平移</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    const loadingEl = document.getElementById("loading");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 4, 8);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.prepend(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 1.5;
    controls.maxDistance = 30;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.8;
    const ambientLight = new THREE.AmbientLight(0x8686a8, 0.6);
    scene.add(ambientLight);
    const mainLight = new THREE.DirectionalLight(0xffeedd, 2.2);
    mainLight.position.set(6, 10, 4);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.6);
    fillLight.position.set(-4, 2, -6);
    scene.add(fillLight);
    const rimLight = new THREE.DirectionalLight(0xffccaa, 0.5);
    rimLight.position.set(-2, -1, 8);
    scene.add(rimLight);
    const hemi = new THREE.HemisphereLight(0x8888ff, 0x444422, 0.4);
    scene.add(hemi);
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    ground.receiveShadow = true;
    scene.add(ground);
    const gridHelper = new THREE.GridHelper(12, 20, 0x6666aa, 0x444477);
    gridHelper.position.y = -0.5;
    scene.add(gridHelper);
    const loader = new GLTFLoader();
    loader.load("./mesh_textured_pbr.glb", (gltf) => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      box.getCenter(center);
      const size = new THREE.Vector3();
      box.getSize(size);
      model.position.sub(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      const fitScale = 4 / maxDim;
      if (fitScale < 1 || fitScale > 2) model.scale.setScalar(fitScale);
      model.traverse((child) => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
      scene.add(model);
      const dist = maxDim * 1.8;
      camera.position.set(dist * 0.6, dist * 0.4, dist);
      controls.target.set(0, 0, 0);
      controls.update();
      loadingEl.classList.add("hidden");
    }, (xhr) => {
      if (xhr.total) { const p = Math.round((xhr.loaded/xhr.total)*100); loadingEl.querySelector("span").textContent = "\u52a0\u8f7d\u4e2d\u2026"+p+"%"; }
    }, (err) => {
      loadingEl.querySelector("span").textContent = "\u52a0\u8f7d\u5931\u8d25";
      console.error(err);
    });
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
